worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # Upload limit (PDF + images)
    client_max_body_size 100M;

    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # ──────────────────────────────────────────
    # HTTP → HTTPS redirect
    # ──────────────────────────────────────────
    server {
        listen 80;
        server_name demo.i8studio.vn;

        # Allow certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────
    # HTTPS — main site
    # ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name demo.i8studio.vn;

        ssl_certificate /etc/letsencrypt/live/demo.i8studio.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/demo.i8studio.vn/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Next.js immutable static assets — cache 30 days
        location /_next/static/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=2592000, immutable";
            proxy_set_header Host $host;
        }

        # User-uploaded files — cache 1 day
        location /uploads/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=86400";
            proxy_set_header Host $host;
        }

        # Favicon and static public files
        location ~* \.(ico|png|jpg|jpeg|webp|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=86400";
            proxy_set_header Host $host;
        }

        # Next.js app
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }
}
