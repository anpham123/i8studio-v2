server {
    listen 80;
    server_name i8studio.vn www.i8studio.vn;
    return 301 https://i8studio.vn$request_uri;
}
server {
    listen 443 ssl;
    server_name www.i8studio.vn;
    ssl_certificate /home/cert/cert.pem;
    ssl_certificate_key /home/cert/private.key;
    return 301 https://i8studio.vn$request_uri;
}
server {
    listen 443 ssl;
    server_name i8studio.vn;

    location ^~ /uploads/ {
        alias /srv/i8studio-uploads/;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://i8studio_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /home/cert/cert.pem;
    ssl_certificate_key /home/cert/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 500M;
}
