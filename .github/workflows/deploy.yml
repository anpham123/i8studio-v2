name: Deploy to VPS

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1401
          envs: NEXTAUTH_SECRET
          script: |
            set -e
            cd ~/i8studio-v2

            echo "📥 Pulling latest code..."
            git pull origin master

            echo "🔐 Writing .env file..."
            rm -f .env
            printf 'NEXTAUTH_SECRET=%s\n' "$(printf '%s' "${NEXTAUTH_SECRET}" | tr -d '\n\r')" > .env
            echo "   .env written: $(wc -l < .env) line(s)"

            echo "🐳 Building and restarting containers..."
            docker compose up --build -d --remove-orphans

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deploy complete!"
            docker compose ps
            echo "🐳 Container logs (last 50 lines):"
            docker compose logs --tail=50 app

      - name: Fetch app logs from VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -p 1401 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd ~/i8studio-v2 && docker compose logs --tail=200 app" > app_logs.txt

      - name: Commit and push app logs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add app_logs.txt
          git commit -m "chore: update app logs [skip ci]" || exit 0
          git push origin master
